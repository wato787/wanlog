[tools]
# 最新: v1.3.10 (https://github.com/oven-sh/bun/releases)
bun = "1.3"

[tasks]
# 開発サーバー（mise run dev:api / mise run dev:web）
[tasks."dev:api"]
description = "API (Hono) 開発サーバー"
dir = "apps/api"
run = "bun run dev"

[tasks."dev:web"]
description = "Web (Vite) 開発サーバー"
dir = "apps/web"
run = "bun run dev"

[tasks.typecheck]
description = "tsgo で型チェック（モノレポ全体）"
run = "bun run typecheck"

[tasks.lint]
description = "oxlint でリント"
run = "bunx oxlint ."

[tasks.format]
description = "oxfmt でフォーマット"
run = "bunx oxfmt ."

[tasks."test:api"]
description = "API のテスト実行"
dir = "apps/api"
run = "bun run test"

[tasks."test:web"]
description = "Web のテスト実行"
dir = "apps/web"
run = "bun run test"

[tasks."db:generate"]
description = "Drizzle マイグレーション生成"
dir = "apps/api"
run = "bun run db:generate"

[tasks."db:migrate:local"]
description = "ローカル D1 にマイグレーション適用"
dir = "apps/api"
run = "bun run db:migrate:local"

[tasks."build:web"]
description = "Web をビルド（tsgo 型チェック + Vite）"
dir = "apps/web"
run = "bun run build"

[tasks."deploy:web"]
description = "Web を Cloudflare Pages にデプロイ"
dir = "apps/web"
run = "bun run build && bun run deploy"
